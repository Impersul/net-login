<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Page</title>
  
  <style>
  :root {
  --bg: #f5f7fa;
  --card: #ffffff;
  --text: #1a1a1a;
  --input: #eef1f5;
  --primary: #4f46e5;
}

body.dark {
  --bg: #0f172a;
  --card: #1e293b;
  --text: #f1f5f9;
  --input: #334155;
  --primary: #6366f1;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Segoe UI", sans-serif;
}

body {
  background: var(--bg);
  color: var(--text);
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  transition: 0.3s;
}

.container {
  width: 100%;
  max-width: 380px;
  padding: 20px;
}

.card {
  background: var(--card);
  padding: 30px;
  border-radius: 16px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
  transition: 0.3s;
}

h2 {
  text-align: center;
  margin-bottom: 20px;
}

.input-group {
  margin-bottom: 15px;
}

.input-group label {
  font-size: 14px;
  margin-bottom: 5px;
  display: block;
}

.input-group input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: var(--input);
  color: var(--text);
  outline: none;
  font-size: 14px;
}

.input-group input:focus {
  outline: 2px solid var(--primary);
}

button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: var(--primary);
  color: white;
  font-size: 15px;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  opacity: 0.9;
}

.toggle-mode {
  position: absolute;
  top: 20px;
  right: 20px;
  cursor: pointer;
  background: var(--card);
  border-radius: 50px;
  padding: 8px 12px;
  font-size: 14px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.footer {
  text-align: center;
  margin-top: 15px;
  font-size: 13px;
}

.footer a {
  color: var(--primary);
  text-decoration: none;
}

@media (max-width: 400px) {
  .card {
    padding: 20px;
  }
}

.message {
  margin-top: 10px;
  text-align: center;
  font-size: 14px;
  color: #ef4444;
  min-height: 18px;
}
</style>

</head>

<body>

<div class="toggle-mode" id="toggleMode">🌙</div>

<div class="container">
  <div class="card">
    <h2>Welcome Back</h2>

    <form id="loginForm">
      <div class="input-group">
        <label>Email</label>
        <input type="email" placeholder="Enter your email" required>
      </div>

      <div class="input-group">
        <label>Password</label>
        <input type="password" placeholder="Enter your password" required>
      </div>

      <button type="submit">Login</button>

      <!-- Message area -->
      <p id="message" class="message"></p>
    </form>

    <div class="footer">
      Don’t have an account? <br>
      <strong>Request for early access</strong><br>
      <span>Sign up coming soon</span>
    </div>
  </div>
</div>


  <script>
  // Load saved theme
document.addEventListener("DOMContentLoaded", () => {
  if (localStorage.getItem("theme") === "dark") {
    document.body.classList.add("dark");
  }
});

// Toggle dark/light mode
const toggleBtn = document.getElementById("toggleMode");

toggleBtn.addEventListener("click", () => {
  document.body.classList.toggle("dark");

  const isDark = document.body.classList.contains("dark");
  localStorage.setItem("theme", isDark ? "dark" : "light");
});

// Login handler
const form = document.getElementById("loginForm");
const message = document.getElementById("message");

form.addEventListener("submit", (e) => {
  e.preventDefault();

  // Always reject (whitelist system placeholder)
  message.textContent = "Account not in whitelist";
});
</script>
</body>
</html>
